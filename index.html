<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Baloo+2:wght@600&display=swap" rel="stylesheet">
    
    <style>
        /* Definindo a Buka Bird (Simulada via font-face se você tiver o arquivo, 
           ou usando uma similar caso não carregue localmente) */
        @font-face {
            font-family: 'Buka Bird';
            src: url('BukaBird.ttf'); /* Certifique-se de ter o arquivo ou use uma similar */
        }

        :root {
            --azul-destaque: #1b2d83;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Baloo 2', cursive;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .main-container {
            position: relative;
            width: 100%; max-width: 450px;
            height: 100vh;
            background: #121212;
        }

        /* TELA 1: ENVELOPE */
        #startScreen {
            position: absolute;
            width: 100%; height: 100%;
            background: url('envelope.jpeg') center/cover no-repeat;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 50; cursor: pointer;
        }

        #soundAlert {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8);
            color: var(--azul-destaque);
            padding: 8px 25px;
            border-radius: 15px;
            border: 2px solid var(--azul-destaque);
            font-family: 'Luckiest Guy', cursive;
            font-size: 14px;
            z-index: 60;
            animation: pulseSuave 2s infinite;
        }

        .tap-text {
            position: absolute;
            bottom: 12%;
            font-family: 'Buka Bird', 'Luckiest Guy', cursive;
            font-size: 32px;
            color: var(--azul-destaque);
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
            animation: blinkFilme 1.5s infinite;
        }

        video {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
            z-index: 10;
        }

        @keyframes pulseSuave {
            0%, 100% { transform: translate(-50%, 0) scale(1); }
            50% { transform: translate(-50%, 0) scale(1.05); }
        }

        @keyframes blinkFilme { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .fade-in { display: block !important; animation: fadeInAnim 0.5s forwards; }
        @keyframes fadeInAnim { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div id="soundAlert">⚠️ LIGUE O SOM! 🔊</div>

        <div id="startScreen" onclick="iniciar()">
            <div class="tap-text">TOQUE PARA ABRIR</div>
        </div>

        <video id="video01" src="video1.mp4" playsinline></video>
        <video id="video2" src="video2.mp4" loop playsinline></video>

    </div>

    <script>
        const v01 = document.getElementById('video01');
        const v02 = document.getElementById('video2');
        const startScreen = document.getElementById('startScreen');
        const soundAlert = document.getElementById('soundAlert');

        function iniciar() {
            startScreen.style.display = 'none';
            soundAlert.style.display = 'none';
            
            v01.style.display = 'block';
            v01.play();
        }

        // Quando o vídeo 01 terminar, faz a transição para o vídeo 2
        v01.onended = function() {
            v01.style.display = 'none';
            v02.classList.add('fade-in');
            v02.play();
        };
    </script>
</body>
</html>
